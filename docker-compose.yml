services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - invoice_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - invoice_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - invoice_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    container_name: backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      S3_BUCKET_NAME: invoices
      AWS_ENDPOINT: http://minio:9000
      SOCKET_URL: http://backend:3000
    volumes:
      - ./server:/app
      - /app/node_modules
      - ./shared:/app/shared
    ports:
      - "3001:3000"
    networks:
      - invoice_network
    restart: unless-stopped
    command: npm run dev

  frontend:
    build: ./client
    container_name: frontend
    ports:
      - "3002:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=http://backend:3001
    networks:
      - invoice_network
    restart: unless-stopped
    depends_on:
      - backend

  pdf-worker:
    build: ./workers/pdf-worker
    container_name: pdf-worker
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      S3_BUCKET_NAME: invoices
      AWS_ENDPOINT: http://minio:9000
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: true
      SOCKET_URL: http://backend:3000
    networks:
      - invoice_network
    volumes:
      - ./workers/pdf-worker:/app
      - ./shared:/app/shared
      - /app/node_modules
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - invoice_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 👇 НОВЫЙ СЕРВИС ДЛЯ АВТОМАТИЧЕСКОЙ НАСТРОЙКИ MINIO
  minio-init:
    image: minio/mc
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - invoice_network
    entrypoint: >
      /bin/sh -c "
        echo '⏳ Waiting for MinIO...';
        sleep 5;
        mc alias set myminio http://minio:9000 minioadmin minioadmin;
        echo '📦 Creating bucket...';
        mc mb myminio/invoices 2>/dev/null || echo 'Bucket already exists';
        echo '🔓 Setting public access...';
        mc anonymous set download myminio/invoices;
        echo '✅ MinIO initialized successfully!';
        exit 0;
      "

  invoice-worker:
    build: ./workers/invoice-worker
    container_name: invoice-worker
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SOCKET_URL: http://backend:3000
    volumes:
      - ./workers/invoice-worker:/app
      - /app/node_modules
      - ./shared:/app/shared
    networks:
      - invoice_network
    restart: unless-stopped
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:

networks:
  invoice_network:
    driver: bridge